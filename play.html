<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VS Traffic — playable game</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>VS&nbsp;Traffic</h1>
        <p class="tagline">Dodge traffic. Grab coins. Beat the rival.</p>
      </header>

      <!-- Live game state, mirrored to the DOM so Kane CLI can read it
           without inspecting canvas pixels. -->
      <section class="hud" aria-label="Game status">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span id="score" data-testid="score" data-score="0">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Lives</span>
          <span id="lives" data-testid="lives" data-lives="3">♥♥♥</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Rival</span>
          <span id="rival-score" data-testid="rival-score" data-rival-score="0">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Status</span>
          <span id="status" data-testid="status" data-status="menu">Menu</span>
        </div>
      </section>

      <main class="stage">
        <canvas id="game" width="480" height="640" aria-label="Driving game canvas"></canvas>

        <div id="overlay" class="overlay" data-testid="overlay">
          <div id="menu" class="panel" data-testid="menu-panel">
            <h2>Choose a mode</h2>
            <button data-testid="mode-solo" data-mode="solo">Solo</button>
            <button data-testid="mode-2p" data-mode="2p">2&nbsp;Players</button>
            <p class="controls-hint">
              P1: ← → &nbsp;·&nbsp; P2: A D &nbsp;·&nbsp; Pause: P
            </p>
          </div>

          <div id="gameover" class="panel hidden" data-testid="gameover-panel">
            <h2 data-testid="gameover-title">Game Over</h2>
            <p>
              Your score:
              <strong id="final-score" data-testid="final-score" data-final-score="0">0</strong>
            </p>
            <p id="result-line" data-testid="result-line"></p>
            <button data-testid="restart" data-action="restart">Play again</button>
          </div>
        </div>
      </main>

      <footer class="footer">
        <a href="/" data-testid="back-to-studio">← Back to Playtest Studio</a>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
